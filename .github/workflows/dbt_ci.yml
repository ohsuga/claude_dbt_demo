name: dbt CI (PR Verification)

on:
  pull_request:
    branches: [main]
    paths:
      - "models/**"
      - "tests/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "dbt_project.yml"
      - "packages.yml"
      - "profiles.yml.template"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dbt-ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    environment: ci

    env:
      DBT_PROFILES_DIR: .
      DBT_SCHEMA: DBT_PR_${{ github.event.pull_request.number }}

      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_PRIVATE_KEY_PATH: rsa_key.p8

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout main branch for state comparison
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt (pin recommended)
        run: |
          pip install --upgrade pip
          pip install "dbt-core==1.11.*" "dbt-snowflake==1.11.*"

      - name: Create profiles.yml from template
        run: cp profiles.yml.template profiles.yml

      - name: Setup Snowflake private key
        run: |
          printf "%s" "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > rsa_key.p8
          chmod 600 rsa_key.p8

      - name: Debug Key File (Check Header)
        run: |
          ls -l rsa_key.p8
          head -n 1 rsa_key.p8
          
      - name: Install dbt packages (PR)
        run: dbt deps

      - name: Generate state manifest from main branch
        run: |
          cd main-branch
          # Use profiles.yml.template from current branch (not main)
          cp ../profiles.yml.template profiles.yml
          cp ../rsa_key.p8 ./rsa_key.p8
          export DBT_PROFILES_DIR=.
          dbt deps
          dbt parse --target prod --profiles-dir .
          cd ..
          mkdir -p state
          cp main-branch/target/manifest.json state/manifest.json

      - name: Run dbt debug (optional but helpful)
        run: dbt debug --target ci

      - name: Install Snowflake CLI
        run: |
          pipx install "snowflake-cli>=3.0.0,<4.0.0"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Snowflake CLI config
        run: |
          mkdir -p ~/.snowflake
          cat <<'EOF' > ~/.snowflake/config.toml
          [connections.github_connection]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "${GITHUB_WORKSPACE}/rsa_key.p8"
          EOF
          chmod 600 ~/.snowflake/config.toml
          
      - name: Test Snowflake CLI Connection
        run: |
          snow connection test --connection github_connection
          
      - name: Create PR Schema
        run: |
          snow sql -q "CREATE SCHEMA IF NOT EXISTS ${{ env.SNOWFLAKE_DATABASE }}.${{ env.DBT_SCHEMA }}" --connection github_connection
      
      - name: Run dbt build (Slim CI)
        id: dbt_build
        run: |
          dbt build             --select +state:modified+             --exclude test_name:relationships*             --defer             --state state             --target ci

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.dbt_build.outcome }}';
            const emoji = outcome === 'success' ? '✅' : (outcome === 'cancelled' ? '⚪️' : '❌');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `${emoji} **dbt CI (Slim CI): ${outcome}**`,
              ``,
              `- PR Schema: \`${process.env.DBT_SCHEMA}\``,
              `- State: \`main\` の manifest を使用（--defer）`,
              `- Logs: ${runUrl}`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Clean up PR schema
        if: always()
        continue-on-error: true
        run: |
          snow sql -q "DROP SCHEMA IF EXISTS ${{ env.SNOWFLAKE_DATABASE }}.${{ env.DBT_SCHEMA }}" --connection github_connection
      - name: Clean up private key
        if: always()
        run: rm -f rsa_key.p8 profiles.yml
